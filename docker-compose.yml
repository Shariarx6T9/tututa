version: "3.9"

# ============================================================
# AYRA — Local Development Stack
# Run: docker compose up -d
# ============================================================

services:
  # PostgreSQL — primary database
  postgres:
    image: postgres:16-alpine
    container_name: ayra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ayra
      POSTGRES_PASSWORD: ayra_local_password
      POSTGRES_DB:       ayra
    ports:
      - "5432:5432"
    volumes:
      - ayra_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ayra"]
      interval: 5s
      timeout: 5s
      retries: 5

  # pgAdmin — optional DB browser at http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ayra-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@ayra.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools   # only start with: docker compose --profile tools up

volumes:
  ayra_postgres_data:
    driver: local

# ── Usage ────────────────────────────────────────────────────
# Start DB only:
#   docker compose up -d postgres
#
# With pgAdmin:
#   docker compose --profile tools up -d
#
# Stop everything:
#   docker compose down
#
# Reset DB:
#   docker compose down -v && docker compose up -d
#
# Connection string for .env.local:
#   DATABASE_URL="postgresql://ayra:ayra_local_password@localhost:5432/ayra"
